<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>联系 · lambertlab</title>
  <meta name="description" content="LambertLab 联系方式" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="../css/bento-pages.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">跳到主要内容</a>
  <div class="wrap">
    <header class="topbar">
      <a class="logo" href="../">lambertlab</a>
      <nav>
        <a class="nav-link" href="../#about">关于</a>
        <a class="nav-link" href="../projects/">项目</a>
        <a class="nav-link" href="../insights/">洞察</a>
        <a class="nav-link" href="../#contact">首页联系</a>
      </nav>
    </header>

    <main id="main-content">
      <section class="hero">
        <p class="kicker">Contact</p>
        <h1>欢迎交流</h1>
        <p>如果你正在建设数据基础设施、产品化 AI 工具，或以协作为核心的工程流程，欢迎附上背景信息发来简短消息。</p>
      </section>

      <section class="grid" aria-label="联系渠道">
        <article class="card span-2">
          <p class="mini">Primary</p>
          <h3>GitHub</h3>
          <p>查看项目、仓库和最近更新。</p>
          <div class="actions">
            <a class="btn primary" href="https://github.com/lambertlab" target="_blank" rel="noreferrer">打开 GitHub</a>
          </div>
        </article>

        <article class="card span-2">
          <p class="mini">Email</p>
          <h3>邮箱</h3>
          <p>适合项目合作、技术咨询和长期协作沟通。</p>
          <div class="actions">
            <a class="btn primary" href="mailto:you@example.com">发送邮件</a>
          </div>
        </article>

        <article class="card span-2">
          <p class="mini">Back</p>
          <h3>返回首页</h3>
          <p>继续浏览首页中的项目与洞察。</p>
          <div class="actions">
            <a class="btn" href="../">回到首页</a>
          </div>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
