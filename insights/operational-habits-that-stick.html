        <h1>让团队持续交付的运营习惯</h1>
        <p>持续交付的核心并非“冲刺更快”，而是建立稳定节奏，让团队能长期输出可验证的结果。</p>
      </section>

      <article class="article">
        <h2>关键实践</h2>
        <p>先定义稳定节奏：固定计划窗口、评审窗口和回顾窗口，减少临时决策造成的上下文混乱。</p>
        <p>再建立最小闭环：每次迭代都包含目标、验证和反馈，不把问题长期滚动积压到未来版本。</p>
        <p>最后是透明化协作状态：让关键指标和风险可见，团队才可能在同一事实基础上做取舍。</p>
